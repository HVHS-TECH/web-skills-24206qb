<style>
.container {
  display: grid;
  height: 908px;
  background-color: rgb(66, 190, 194);
  padding: 10px;
  gap: 10px;
  
}
.container div {
  background-color: #f1f1f1;
  color:#000;
  padding: 10px;
  font-size: 30px;
  text-align: center;
}
.item1 {
  grid-column: 1 / 3;
}

.item10 {
  grid-area: 3 / 3 / span 1 / span 2;
}
</style>
</head>
