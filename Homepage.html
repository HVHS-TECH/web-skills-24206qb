<html lang=en>

<head>

  <title>My cool page</title>
  <link href="styles.css" rel="stylesheet">

</head>

<style>
.container {
  display: grid;
  height: 908px;
  background-color: rgb(147, 195, 197);
  grid-template-rows: 100px 100px 450px auto;
  gap: 10px;
  padding: 10px;
}
.container div {
  background-color: #f1f1f1;
  color:#000;
  padding: 10px;
  font-size: 30px;
  text-align: center;
}
.item1 {
  grid-column: 1 / 5;
}

.item6 {
  grid-row: 3 / span 2;
}

.item9 {
  grid-column: 5 / 4;
  grid-row: 3 / span 2;
}

.item7 {
  grid-column: 2 / span 2;
  grid-row: 3 / span 2;
}

.item2 {
  grid-column: 1 / 5;
}
.item11 {
    grid-column: 4 / 2;
}
</style>
</head>
<body>

<div class="container">
  <div class="item1">nav</div>
  <div class="item2">header</div>
  <div class="item6">left arrow</div>
  <div class="item7">picture/information</div>
  <div class="item9">right arrow</div>
  <div class="item12">stuff</div>
  <div class="item11"> click for more information</div>
  <div class="item13">stuff</div>
</div>

</body>



</html>
